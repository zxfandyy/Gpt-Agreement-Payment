name: Feature 请求
description: 提议新能力、新 solver 题型、新自愈环
title: "[feat] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        提交之前先看下：

        - **新 hCaptcha 题型**：附 prompt 截图和 `/tmp/hcaptcha_auto_solver*/` 里的 `round_XX.json`
        - **协议阶段变更**（Stripe / PayPal / OpenAI 出 breaking change）：附相关流量抓包或 response body 让我们核对新结构
        - **涉及未授权使用**第三方服务的请求：别提交。看 [`SECURITY.md`](https://github.com/DanOps-1/Gpt-Agreement-Payment/blob/main/SECURITY.md)

  - type: textarea
    id: motivation
    attributes:
      label: 这解决什么问题
      description: 你想做的事现在做不到？
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 怎么做
      description: 你打算怎么实现？粗略思路也行
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
      description: 现有 workaround、其他工具的类似功能等

  - type: dropdown
    id: category
    attributes:
      label: 分类
      options:
        - hCaptcha solver —— 新题型
        - hCaptcha solver —— 现有 solver 改进
        - 协议重放 —— 新阶段 / 新端点
        - Daemon —— 新自愈环
        - 配置 —— 新 flag / 选项
        - 文档
        - 工具链 / CI / 开发体验
        - 其他
    validations:
      required: true

  - type: checkboxes
    id: contribute
    attributes:
      label: 你愿意亲自实现吗
      options:
        - label: 我可以提 PR
        - label: 我可以协助测试
        - label: 我只是建议，需要别人实现

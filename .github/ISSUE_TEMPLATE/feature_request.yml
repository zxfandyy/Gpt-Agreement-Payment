name: Feature Request
description: Propose new capabilities, new solver question types, new self-healing loops
title: "[feat] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, please check:

        - **New hCaptcha question type**: Attach prompt screenshot and `round_XX.json` from `/tmp/hcaptcha_auto_solver*/`
        - **Protocol phase changes** (Stripe / PayPal / OpenAI breaking changes): Attach relevant traffic captures or response body for us to verify new structure
        - **Requests involving unauthorized use** of third-party services: Do not submit. See [`SECURITY.md`](https://github.com/DanOps-1/Gpt-Agreement-Payment/blob/main/SECURITY.md)

  - type: textarea
    id: motivation
    attributes:
      label: What problem does this solve
      description: Can't accomplish what you want to do right now?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: How to do it
      description: How do you plan to implement it? A rough idea is fine
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternative solutions considered
      description: Existing workarounds, similar features in other tools, etc.

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - hCaptcha solver — New question type
        - hCaptcha solver — Improvement to existing solver
        - Protocol replay — New phase / New endpoint
        - Daemon — New self-healing loop
        - Configuration — New flag / option
        - Documentation
        - Toolchain / CI / Development experience
        - Other
    validations:
      required: true

  - type: checkboxes
    id: contribute
    attributes:
      label: Are you willing to implement this yourself
      options:
        - label: I can submit a PR
        - label: I can help with testing
        - label: I'm just making a suggestion, someone else needs to implement it

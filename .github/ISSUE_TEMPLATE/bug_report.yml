name: Bug Report
description: The toolkit itself has issues (excluding cases like "Stripe blocked my account")
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, check:

        - **Account suspended, IP flagged, PayPal rejected** —— This is expected, see [Anti-fraud Evidence](https://github.com/DanOps-1/Gpt-Agreement-Payment#-anti-fraud-evidence). Don't open an issue
        - **Suspected security vulnerability** (credential leakage, injection, etc.) —— See [`SECURITY.md`](https://github.com/DanOps-1/Gpt-Agreement-Payment/blob/main/SECURITY.md), don't disclose publicly
        - **Used against unauthorized targets** —— Don't open an issue, and please stop

  - type: textarea
    id: what-happened
    attributes:
      label: What went wrong?
      description: What command did you run, where did it hang?
      placeholder: |
        Ran `xvfb-run -a python pipeline.py --config CTF-pay/config.paypal.json --paypal`
        Hung at [B6] stage, error "DataDome slider not detected"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: pipeline should solve the slider and proceed to redirect step
    validations:
      required: true

  - type: input
    id: stage
    attributes:
      label: Which stage hung
      description: Which pipeline stage failed? (`registration` / `Stripe confirm` / `PayPal B-DDC` / `OAuth callback` / `daemon loop` etc.)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Last 30–50 lines from `output/logs/card.log`. **Redact before posting**: tokens, cookies, real emails, IPs, PII all masked
      render: shell
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Runtime environment
      placeholder: |
        - OS: Kali Linux 2026.1
        - Python: 3.11.7
        - playwright: 1.44.0
        - camoufox: 0.4.1
        - Mode: daemon / single-run / batch / self-dealer
    validations:
      required: true

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmation
      options:
        - label: I'm targeting systems I own or have explicit written permission for
          required: true
        - label: Logs / screenshots in this issue are redacted (credentials, cookies, PII)
          required: true
        - label: I've searched existing issues, no duplicates
          required: true

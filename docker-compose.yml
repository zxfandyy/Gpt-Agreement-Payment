# Gpt-Agreement-Payment / Single-container webui
#
# Usage:
#   git clone <repo> && cd Gpt-Agreement-Payment
#   docker compose up -d --build
#   Open browser to http://127.0.0.1:8765/  (First time go to /setup to create admin)
#
# Config files are automatically bootstrapped by entrypoint from *.example.json, edit on host
# CTF-pay/config.paypal.json + CTF-reg/config.paypal-proxy.json, then
# Container reads in real-time via bind mount, restart docker compose after changes to take effect.

services:
  webui:
    build:
      context: .
      dockerfile: Dockerfile
    image: gpt-agreement-payment:local
    container_name: gap-webui
    ports:
      # By default only exposes 127.0.0.1, use nginx reverse proxy or explicitly change to "0.0.0.0:8765:8765" for public network
      - "127.0.0.1:8765:8765"
    volumes:
      # Entire repository bind mount —— host git working tree is SOURCE OF TRUTH,
      # Code changes take effect immediately with docker exec / restart; no need to rebuild.
      # Do not use single-file mount (inode stale: after atomic-rename by editor, container holds stale inode).
      - .:/app
      # Mask host frontend node_modules / dist, let baked version in image take effect
      # (anonymous volume syncs from image on startup, not overwritten by empty host directory)
      - /app/webui/frontend/node_modules
      - /app/webui/frontend/dist
      # webui SQLite + registration results + domain pool state all stored here (host can see and backup)
      - ./output:/app/output
    environment:
      # webui SQLite + wizard state storage location (settings.py defaults to /app/output)
      WEBUI_DATA_DIR: /app/output
      # OTP timeout: 60s is better than original 180s for hitting OpenAI honeypot (existing accounts fake branch doesn't actually send email)
      # Fast failure allows outer layer to retry with new persona/IP. CF Email→Worker→KV path tested end-to-end ~0.3s,
      # 60s provides 200x margin. For longer timeout, override in user .env.
      OTP_TIMEOUT: "60"
      # Registration agreement path forces use of Node/QuickJS Sentinel; runtime image will
      # validate /usr/local/bin/node exists at entrypoint, otherwise fail-fast.
      OPENAI_SENTINEL_REQUIRE_QUICKJS: "1"
      OPENAI_SENTINEL_NODE_PATH: /usr/local/bin/node
      # WEBUI_QRIS_FORCE_MOCK: "1"  # Demo mode (bypass OpenAI risk control); turn off for real payment
    restart: unless-stopped
    # Browser automation processes are numerous, default shm 64MB is insufficient (firefox crashes)
    shm_size: "1gb"
